name: Deploy Plugin Manager Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  repository_dispatch:
    types: [plugin-release]
  workflow_run:
    workflows: ["Build Dec 18 Studios Plugins"]
    types: [completed]
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/deploy-plugin-manager-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: plugin-manager-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Generate plugin channel manifests from latest plugin releases
        env:
          # PLUGIN_REPOS_PAT must have 'repo' scope to read private plugin repos.
          # Add it as a repository secret in Dec18-Plugin-Manager settings.
          PLUGIN_PAT: ${{ secrets.PLUGIN_REPOS_PAT }}
        run: |
          mkdir -p tmp/releases tmp/configs

          # All plugin repos: REPO_NAME|PLUGIN_ID
          PLUGINS=(
            "Hue-Contrast-Compressor-DCTL|hue-contrast-compressor-dctl"
            "Perfect-Exposure-DCTL|perfect-exposure-dctl"
            "Volume-Curve-DCTL|volume-curve-dctl"
            "Grain-By-Greg-DCTL|grain-by-greg-dctl"
            "Film-Negative-Space-CST-DCTL|film-negative-spac-cst-dctl"
            "Saturation-Separator-DCTL|saturation-separator-dctl"
            "Linear-Ramp-Diagnostic-DCTL|linear-ramp-diagnostic-dctl"
            "Color-Slice-Omatic-DCTL|color-slice-omatic-dctl"
            "Dolby-Vision-Spoofer-DCTL|dolby-vision-spoofer-dctl"
            "Hue-Contrast-Compressor-OFX|hue-contrast-compressor-ofx"
            "Technically-Technicolor-DRT|technicolor-drt"
            "PhotoChemist-OFX|photochemist"
            "OpenDRT-OFX|opendrt-ofx"
            "IBKeymaster-OFX|ibkeymaster-ofx"
            "X-Grade-OFX|x-grade-ofx"
            "Resolve-Node-Toggler|resolve-node-toggler"
          )

          PROCESSED=0

          for entry in "${PLUGINS[@]}"; do
            IFS='|' read -r REPO PLUGIN_ID <<< "$entry"
            CONFIG_FILE="tmp/configs/${PLUGIN_ID}-config.json"
            RELEASES_FILE="tmp/releases/${PLUGIN_ID}-releases.json"

            # Fetch config from private repo
            if ! curl -fsSL \
              -H "Authorization: token $PLUGIN_PAT" \
              "https://raw.githubusercontent.com/dec18studios/${REPO}/main/manager-release-config.json" \
              -o "$CONFIG_FILE" 2>/dev/null; then
              echo "::notice::${REPO}: no config found — skipping"
              continue
            fi

            # Fetch releases
            if ! curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $PLUGIN_PAT" \
              "https://api.github.com/repos/dec18studios/${REPO}/releases?per_page=100" \
              -o "$RELEASES_FILE" 2>/dev/null; then
              echo "::notice::${REPO}: failed to fetch releases — skipping"
              continue
            fi

            # Check for at least one stable release with assets
            STABLE_COUNT=$(jq '[.[] | select(.draft == false and .prerelease == false and (.assets | length > 0))] | length' "$RELEASES_FILE" 2>/dev/null || echo 0)
            if [ "$STABLE_COUNT" -eq 0 ]; then
              echo "::notice::${REPO}: no stable releases with assets yet — skipping"
              continue
            fi

            echo "::notice::Generating manifests for ${PLUGIN_ID} from ${REPO} (${STABLE_COUNT} stable releases)"
            node tools/generate-plugin-channel-manifests.mjs \
              --manager-root "$GITHUB_WORKSPACE" \
              --config "$GITHUB_WORKSPACE/$CONFIG_FILE" \
              --releases-json "$GITHUB_WORKSPACE/$RELEASES_FILE"
            PROCESSED=$((PROCESSED + 1))
          done

          echo "::notice::Processed ${PROCESSED}/${#PLUGINS[@]} plugin repos"

      - name: Rewrite download URLs through proxy
        env:
          PROXY_BASE: ${{ vars.DOWNLOAD_PROXY_URL || 'https://dec18-download-proxy.dec18studios.workers.dev' }}
        run: |
          # Rewrite browser_download_url in manifests to route through the proxy
          # e.g. https://github.com/dec18studios/Repo/releases/download/v1.0/Asset.zip
          #   → https://proxy/v1/dec18studios/Repo/releases/download/v1.0/Asset.zip
          for manifest in docs/plugins/*/stable.json docs/plugins/*/beta.json; do
            [ -f "$manifest" ] || continue
            sed -i "s|https://github.com/\([^/]*/[^/]*/releases/download/[^\"]*\)|${PROXY_BASE}/v1/\1|g" "$manifest"
            echo "::notice::Rewrote download URLs in $(basename $(dirname $manifest))/$(basename $manifest)"
          done

      - name: Prepare Pages content
        run: |
          rm -rf pages-dist
          cp -R docs pages-dist

      - name: Generate updater feed from latest manager release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          node tools/generate-updater-feed.mjs --output pages-dist/updates/latest.json

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "pages-dist"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
