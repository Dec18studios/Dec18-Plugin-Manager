name: Probe Squarespace Orders API
on: workflow_dispatch

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe Orders API
        env:
          SQ_KEY: ${{ secrets.SQUARESPACE_API_KEY }}
        run: |
          echo "=== Orders API ==="
          RESP=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer $SQ_KEY" \
            "https://api.squarespace.com/1.0/commerce/orders?modifiedAfter=2020-01-01T00:00:00Z&modifiedBefore=2027-01-01T00:00:00Z")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "$BODY" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          orders = data.get('result', [])
          print(f'Total orders: {len(orders)}')
          print()
          print(f'{\"#\":<4} {\"Date\":<12} {\"Name\":<30} {\"Email\":<40} {\"Product\":<25} {\"Total\":>8}')
          print('-' * 120)
          for o in orders:
              ba = o.get('billingAddress', {})
              sa = o.get('shippingAddress', {})
              name = f'{ba.get(\"firstName\",\"\") or sa.get(\"firstName\",\"\")} {ba.get(\"lastName\",\"\") or sa.get(\"lastName\",\"\")}'.strip()
              if not name:
                  name = o.get('customerEmail','?').split('@')[0]
              email = o.get('customerEmail','?')
              date = o.get('createdOn','?')[:10]
              num = o.get('orderNumber','?')
              total = o.get('grandTotal',{}).get('value','?')
              items = o.get('lineItems', [])
              prod = items[0].get('productName','?') if items else '?'
              print(f'{num:<4} {date:<12} {name:<30} {email:<40} {prod:<25} \${total:>7}')
          "
          else
            echo "Error: $HTTP_CODE"
            echo "$BODY" | head -20
          fi
